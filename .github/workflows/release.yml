name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: true

env:
  RELEASE_VERSION: v0.0.3

jobs:
  release-windows:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10.12.3
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-store-

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build Tauri App (Windows)
        run: pnpm tauri build

      - name: Prepare Windows Asset
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $version = $env:RELEASE_VERSION
          $exeCandidates = @(
            'src-tauri/target/release/claw-switch.exe',
            'src-tauri/target/x86_64-pc-windows-msvc/release/claw-switch.exe'
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -eq $exePath) {
            Write-Error 'claw-switch.exe not found after build.'
          }
          $destName = "$version.claw-switch.exe"
          Copy-Item $exePath (Join-Path release-assets $destName) -Force
          Write-Host "Prepared asset: $destName"

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: Claw Switch ${{ env.RELEASE_VERSION }}
          prerelease: false
          draft: false
          body: |
            Release ${{ env.RELEASE_VERSION }}

            Windows portable: ${{ env.RELEASE_VERSION }}.claw-switch.exe
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
